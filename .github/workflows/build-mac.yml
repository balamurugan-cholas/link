name: Build Mac Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      # This tells GitHub to stop worrying about the Node 20 deprecation
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      # This stops the build from crashing if you don't have an Apple Certificate
      CSC_IDENTITY_AUTODISCOVERY: false 

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Rebuild Native Modules
        # This is critical for better-sqlite3 and node-llama-cpp
        run: npm run rebuild:native

      - name: Build and Package Mac
        # We add --p never to ensure it doesn't try to publish to GitHub Releases yet
        run: npm run package:mac:all -- --publish never

      - name: Upload Mac Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: link-mac-build
          path: release/*.zip