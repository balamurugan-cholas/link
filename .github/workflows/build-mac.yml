name: Build Mac Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      # Fixes the Node.js 24 warning you saw
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      # This skips Apple's strict code-signing check for now 
      # (Use this only for testing; you need a certificate for a real release)
      CSC_IDENTITY_AUTODISCOVERY: false 

    steps:
      # Updated to v6 to support Node 24
      - name: Check out repository
        uses: actions/checkout@v4 

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Moving to a newer Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Rebuild Native Modules
        run: npm run rebuild:native

      - name: Build and Package Mac
        run: npm run package:mac:all

      - name: Upload Mac Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: link-mac-build
          path: release/*.zip