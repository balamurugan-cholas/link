name: Build Mac Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Fixes the Node 24 warning at the top level
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTODISCOVERY: false # Disables Apple certificate requirement

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Using the latest stable Node
          cache: 'npm'

      - name: Install System Dependencies (REQUIRED for Llama-cpp)
        run: brew install cmake

      - name: Install Project Dependencies
        run: npm install

      - name: Rebuild Native Modules
        run: npm run rebuild:native

      - name: Build and Package Mac (Apple Silicon ONLY for stability)
        # We manually run electron-builder for arm64 to prevent cross-compile crashes
        run: npx electron-builder --mac zip --arm64 --publish never

      - name: Upload Mac Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: link-mac-arm64
          path: release/*.zip